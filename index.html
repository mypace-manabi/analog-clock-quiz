<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>時計を合わせよう</title>
<style>
  body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: #f3f4f6;
  font-family: sans-serif;
  overflow: hidden;
}

  .wrap {
  text-align: center;
  transform: scale(0.9);
  transform-origin: center center;
}

  .title {
    font-size: 34px;
    font-weight: bold;
    margin-bottom: 12px;
  }

  .question {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 18px;
    color: #111827;
  }

  .clock {
    width: 360px;
    height: 360px;
    border: 10px solid #222;
    border-radius: 50%;
    background: white;
    position: relative;
    box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    touch-action: none;
    user-select: none;
    margin: 0 auto;
  }

  .center {
    width: 18px;
    height: 18px;
    background: #222;
    border-radius: 50%;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
  }

  .hand {
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: bottom center;
    cursor: grab;
    border-radius: 999px;
  }

  .hand:active {
    cursor: grabbing;
  }

  /* 短針：タッチ判定を大きく、見た目は細く */
  .hour {
    width: 34px;
    height: 95px;
    background: transparent;
    transform: translate(-50%, -100%) rotate(0deg);
    z-index: 3;
  }

  .hour::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 12px;
    height: 95px;
    background: #222;
    border-radius: 999px;
    transform: translateX(-50%);
  }

  /* 長針：タッチ判定を大きく、見た目は細く */
  .minute {
    width: 44px;
    height: 135px;
    background: transparent;
    transform: translate(-50%, -100%) rotate(0deg);
    z-index: 4;
  }

  .minute::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 8px;
    height: 135px;
    background: #2563eb;
    border-radius: 999px;
    transform: translateX(-50%);
  }

  .number {
    position: absolute;
    left: 50%;
    top: 50%;
    font-size: 28px;
    font-weight: bold;
    transform: translate(-50%, -50%);
    z-index: 2;
  }

  .tick {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 3px;
    height: 14px;
    background: #333;
    transform-origin: center 160px;
  }

  .tick.big {
    width: 5px;
    height: 22px;
    background: #111;
  }

   .buttons {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  button {
    font-size: 22px;
    font-weight: bold;
    padding: 12px 22px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }

  .check {
    background: #2563eb;
    color: white;
  }

  .new {
    background: #16a34a;
    color: white;
  }

  .reset {
    background: #e5e7eb;
    color: #111827;
  }

  .result {
    margin-top: 14px;
    font-size: 30px;
    font-weight: bold;
    min-height: 42px;
  }

  .hint {
    margin-top: 8px;
    color: #555;
    font-size: 15px;
  }

  .difficulty {
  margin-bottom: 16px;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.level {
  font-size: 20px;
  font-weight: bold;
  padding: 10px 18px;
  border: 3px solid #d1d5db;
  border-radius: 999px;
  background: white;
  color: #111827;
  box-shadow: none;
}

.level.active {
  background: #f97316;
  color: white;
  border-color: #f97316;
}
  
</style>
</head>
<body>
  
<audio id="correctSound" src="correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="wrong.mp3" preload="auto"></audio>
  
<div class="wrap">
  <div class="title"><ruby>時計<rt>とけい</rt></rt></ruby>をあわせよう</div>

  <div class="question" id="questionText">
    3時00分にあわせよう
  </div>

  <div class="difficulty">
    <button class="level active" data-step="10">かんたん</button>
    <button class="level" data-step="5">ふつう</button>
    <button class="level" data-step="1">むずかしい</button>
  </div>
  
  <div class="clock" id="clock">
    <div class="hand hour" id="hourHand"></div>
    <div class="hand minute" id="minuteHand"></div>
    <div class="center"></div>
  </div>

  <div class="buttons">
    <button class="check" id="checkButton"><ruby>答<rt>こた</rt></ruby>えあわせ</button>
    <button class="new" id="newButton"><ruby>新<rt>あたら</rt></ruby>しい<ruby>問題<rt>もんだい</rt></ruby></button>
    <button class="reset" id="resetButton">リセット</button>
  </div>

  <div class="result" id="resultText"></div>

  <div class="hint">
    <ruby>針<rt>はり</rt></ruby>を<ruby>動<rt>うご</rt></ruby>かして<ruby>時計<rt>とけい</rt></rt></ruby>をあわせます
  </div>
</div>

<script>
  const clock = document.getElementById("clock");
  const hourHand = document.getElementById("hourHand");
  const minuteHand = document.getElementById("minuteHand");
  const questionText = document.getElementById("questionText");
  const resultText = document.getElementById("resultText");
  const checkButton = document.getElementById("checkButton");
  const levelButtons = document.querySelectorAll(".level");
  const newButton = document.getElementById("newButton");
  const resetButton = document.getElementById("resetButton");

  let hour = 12;
  let minute = 0;
  let dragging = null;

  let targetHour = 3;
  let targetMinute = 0;
  let minuteStep = 10;

  let previousMinuteAngle = null;

  // 数字を配置
  for (let i = 1; i <= 12; i++) {
    const num = document.createElement("div");
    num.className = "number";
    num.textContent = i;

    const angle = (i * 30 - 90) * Math.PI / 180;

    // 数字の位置。小さくすると内側に入る
    const r = 115;

    const x = Math.cos(angle) * r;
    const y = Math.sin(angle) * r;

    num.style.transform =
      `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;

    clock.appendChild(num);
  }

  // 目盛りを配置
  for (let i = 0; i < 60; i++) {
    const tick = document.createElement("div");
    tick.className = "tick" + (i % 5 === 0 ? " big" : "");
    tick.style.transform =
      `translate(-50%, -160px) rotate(${i * 6}deg)`;

    clock.appendChild(tick);
  }

  function updateClock() {
    const minuteAngle = minute * 6;
    const hourAngle = ((hour % 12) * 30) + (minute * 0.5);

    minuteHand.style.transform =
      `translate(-50%, -100%) rotate(${minuteAngle}deg)`;

    hourHand.style.transform =
      `translate(-50%, -100%) rotate(${hourAngle}deg)`;

      }

  function getAngleFromPointer(e) {
    const rect = clock.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    const x = e.clientX - cx;
    const y = e.clientY - cy;

    let angle = Math.atan2(y, x) * 180 / Math.PI + 90;
    if (angle < 0) angle += 360;

    return angle;
  }

  function setMinuteFromAngle(angle) {
    minute = Math.round(angle / 6) % 60;
  }

  function setHourFromAngle(angle) {
    const rawHour = Math.round(angle / 30) % 12;
    hour = rawHour === 0 ? 12 : rawHour;
  }

  function nextHour() {
    hour++;
    if (hour > 12) hour = 1;
  }

  function previousHour() {
    hour--;
    if (hour < 1) hour = 12;
  }

  function startDrag(type, e) {
    dragging = type;
    resultText.textContent = "";

    if (type === "minute") {
      previousMinuteAngle = getAngleFromPointer(e);
    }
  }

  function drag(e) {
    if (!dragging) return;

    const angle = getAngleFromPointer(e);

    if (dragging === "minute") {
      if (previousMinuteAngle !== null) {
        const diff = angle - previousMinuteAngle;

        // 反時計回りで12をまたいだ場合
        if (diff > 180) {
          previousHour();
        }

        // 時計回りで12をまたいだ場合
        if (diff < -180) {
          nextHour();
        }
      }

      setMinuteFromAngle(angle);
      previousMinuteAngle = angle;
    }

    if (dragging === "hour") {
      setHourFromAngle(angle);
    }

    updateClock();
  }

  function stopDrag() {
    dragging = null;
    previousMinuteAngle = null;
  }

  function setQuestionText() {
    questionText.textContent =
      `${targetHour}時${String(targetMinute).padStart(2, "0")}分にあわせよう`;
  }

  function makeNewQuestion() {
  targetHour = Math.floor(Math.random() * 12) + 1;

  // 難易度に応じて、10分刻み・5分刻み・1分刻みにする
  const patternCount = 60 / minuteStep;
  targetMinute = Math.floor(Math.random() * patternCount) * minuteStep;

  resultText.textContent = "";
  setQuestionText();
}

  function playCorrectSound() {
  const sound = document.getElementById("correctSound");
  sound.currentTime = 0;
  sound.play();
}
function playWrongSound() {
  const sound = document.getElementById("wrongSound");
  sound.currentTime = 0;
  sound.play();
}  
  function checkAnswer() {
  if (hour === targetHour && minute === targetMinute) {
    resultText.textContent = "正解！";
    resultText.style.color = "#16a34a";

    playCorrectSound();

  } else {
    resultText.textContent = "もう一度！";
    resultText.style.color = "#dc2626";

    playWrongSound();
  }
}

  function resetClock() {
    hour = 12;
    minute = 0;
    resultText.textContent = "";
    updateClock();
  }

  minuteHand.addEventListener("pointerdown", e => {
    startDrag("minute", e);
    minuteHand.setPointerCapture(e.pointerId);
  });

  hourHand.addEventListener("pointerdown", e => {
    startDrag("hour", e);
    hourHand.setPointerCapture(e.pointerId);
  });

  document.addEventListener("pointermove", drag);
  document.addEventListener("pointerup", stopDrag);

  checkButton.addEventListener("click", checkAnswer);
  newButton.addEventListener("click", makeNewQuestion);
  resetButton.addEventListener("click", resetClock);

  levelButtons.forEach(button => {
  button.addEventListener("click", () => {
    minuteStep = Number(button.dataset.step);

    levelButtons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");

    makeNewQuestion();
    resetClock();
  });
});

  makeNewQuestion();
  updateClock();
</script>

</body>
</html>
